/* ---------------- 픽셀 스프라이트 ---------------- */
function mkSprite(rows, pal) {
  const h = rows.length, w = Math.max(...rows.map(r=>r.length));
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const g = c.getContext('2d');
  for (let y=0;y<h;y++) for (let x=0;x<rows[y].length;x++) {
    const col = pal[rows[y][x]];
    if (col) { g.fillStyle=col; g.fillRect(x,y,1,1); }
  }
  return c;
}
const K = '#241633'; // 공통 아웃라인

const SLIME_BODY = [
'.....KKKKKK.....',
'...KKccccccKK...',
'..KcWccccccccK..',
'.KcWWccccccccdK.',
'.KcWcccccccccdK.',
'KccEEcccccEEccdK',
'KccEEcccccEEccdK',
'KccccccccccccddK',
'.KccccKKKKccddK.',
'.KccccccccccddK.',
'..KKKKKKKKKKKK..'];
const SLIME_SLEEP = [

'.KcWcccccccccdK.',

'..KKKKKKKKKKKK..'];
const SPIKES = [
'...S....SS....S.',
'..SSS..SSSS..SS.'];

function mkSlime(color, dark, opts={}) {
  const rows = (opts.spikes ? SPIKES.concat(opts.sleep?SLIME_SLEEP:SLIME_BODY)
                            : (opts.sleep?SLIME_SLEEP:SLIME_BODY));
  return mkSprite(rows, { K, c:color, d:dark, E:'#241633', W:'rgba(255,255,255,.55)', S:dark });
}

/* --- 보스 전용 스프라이트 (68x50 네이티브 도트 — 확대 없이 원본 크기로 작화, 1px 외곽선) --- */
function mkBoss(color, dark, face) { // face: 'awake' | 'sleep' | 'hurt'
  const w=68, h=50;
  const darker = lerpHex(dark, '#100a1a', .35);
  const light  = lerpHex(color, '#ffffff', .3);
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d');
  const cx=33.5, cy=27, rx=32, ry=21;
  const inside=(x,y)=>((x-cx)/rx)**2+((y-cy)/ry)**2<=1;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    if(!inside(x,y))continue;
    const edge=!inside(x-1,y)||!inside(x+1,y)||!inside(x,y-1)||!inside(x,y+1); // 1px 외곽선
    if(edge){ g.fillStyle=K; }
    else{
      const t=(x-cx)/rx + (y-cy)/ry;
      g.fillStyle = t>0.85 ? darker : (t>0.3 ? dark : (t<-0.8 ? light : color));
    }
    g.fillRect(x,y,1,1);
  }
  // 큰 광택 하이라이트
  g.fillStyle='rgba(255,255,255,.6)';
  g.fillRect(16,12,10,3); g.fillRect(13,15,4,4); g.fillRect(25,10,4,2);
  g.fillStyle='rgba(255,255,255,.3)';
  g.fillRect(20,17,5,2);
  const EY=20; // 눈 기준 높이
  if (face==='awake') {
    // 치켜올라간 눈썹 (계단식)
    g.fillStyle=K;
    g.fillRect(17,EY-6,6,2); g.fillRect(22,EY-4,5,2);
    g.fillRect(45,EY-6,6,2); g.fillRect(41,EY-4,5,2);
    // 큰 눈: 흰자 + 동공 (표정으로 차별화)
    g.fillStyle=K; g.fillRect(18,EY-1,10,9); g.fillRect(40,EY-1,10,9);
    g.fillStyle='#f2ead8'; g.fillRect(19,EY,8,7); g.fillRect(41,EY,8,7);
    g.fillStyle=K; g.fillRect(24,EY+2,3,4); g.fillRect(41,EY+2,3,4);
    g.fillStyle='#ffffff'; g.fillRect(25,EY+2,1,1); g.fillRect(42,EY+2,1,1);
    // 굳게 다문 찡그린 입 (물결선, 이빨 없음)
    g.fillStyle=K;
    g.fillRect(26,EY+16,4,2); g.fillRect(30,EY+15,8,2); g.fillRect(38,EY+16,4,2);
    // 뺨 상기
    g.fillStyle='rgba(255,90,90,.3)';
    g.fillRect(14,EY+8,6,3); g.fillRect(48,EY+8,6,3);
  } else if (face==='sleep') {
    // 감은 눈 (곡선)
    g.fillStyle=K;
    g.fillRect(19,EY+3,8,2); g.fillRect(18,EY+2,2,2); g.fillRect(26,EY+2,2,2);
    g.fillRect(41,EY+3,8,2); g.fillRect(40,EY+2,2,2); g.fillRect(48,EY+2,2,2);
    g.fillRect(30,EY+15,8,2); // 살짝 벌린 입
    // 콧방울 침 방울
    g.fillStyle='#bfe9ff'; g.fillRect(49,EY+8,5,5);
    g.fillStyle='#ffffff'; g.fillRect(50,EY+9,2,2);
  } else { // hurt: X자 눈 + 벌어진 입
    g.fillStyle=K;
    for(let i=0;i<7;i++){
      g.fillRect(19+i,EY-1+i,2,2); g.fillRect(25-i,EY-1+i,2,2);
      g.fillRect(41+i,EY-1+i,2,2); g.fillRect(47-i,EY-1+i,2,2);
    }
    g.fillRect(29,EY+13,8,5);
    g.fillStyle='#7d1f2e'; g.fillRect(30,EY+14,6,3);
  }
  return c;
}

const keys = {};
addEventListener('keydown', e => {
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if (keys[e.code]) return;
  keys[e.code] = true;
  onPress(e.code);
});
addEventListener('keyup', e => keys[e.code] = false);

/* ---------------- 모바일: 화면 맞춤 ---------------- */
function fitScreen(){
  const s = Math.min(innerWidth/W, innerHeight/H);
  cv.style.width  = Math.floor(W*s)+'px';
  cv.style.height = Math.floor(H*s)+'px';
}

/* ---------------- 모바일: 터치 입력 (멀티터치) ---------------- */
const TOUCH = { move:0, joyId:null, joyDX:0, pressed:{} };
const JOY  = { x:150, y:H-118, r:64, knob:30, grab:115 }; // 왼쪽 가상 조이스틱
const BTNS = [  // 오른쪽 버튼 배치
  { id:'jump', label:'점프', x:W-95,  y:H-105, r:54 },
  { id:'shot', label:'',     x:W-215, y:H-168, r:44 }, // 흡입/발사 통합
  { id:'dash', label:'대쉬', x:W-228, y:H-58,  r:37 },
  { id:'bomb', label:'폭탄', x:W-340, y:H-108, r:36 },
];
function canvasPos(t){
  const r = cv.getBoundingClientRect();
  return { x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height) };
}
function pressBtn(id){
  if (G.scene !== 'play') return;
  const p = G.player;
  if (id==='jump') jump();
  if (id==='shot') { if (p.loaded) fire(); else trySuck(); } // 장전 상태에 따라 자동 전환
  if (id==='dash') dash();
  if (id==='bomb') throwBomb();
}
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches){
    const c = canvasPos(t);
    if (G.scene !== 'play'){ onPress('Space'); continue; } // 오버레이: 아무 곳이나 탭
    if (TOUCH.joyId===null && Math.hypot(c.x-JOY.x, c.y-JOY.y) < JOY.grab){
      TOUCH.joyId = t.identifier;
      TOUCH.joyDX = Math.max(-JOY.r, Math.min(JOY.r, c.x-JOY.x));
      continue;
    }
    for (const b of BTNS){
      if (Math.hypot(c.x-b.x, c.y-b.y) < b.r + 14){
        TOUCH.pressed[t.identifier] = b.id;
        pressBtn(b.id);
        break;
      }
    }
  }
}, {passive:false});
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches){
    if (t.identifier === TOUCH.joyId){
      const c = canvasPos(t);
      TOUCH.joyDX = Math.max(-JOY.r, Math.min(JOY.r, c.x-JOY.x));
    }
  }
}, {passive:false});
function touchEnd(e){
  e.preventDefault();
  for (const t of e.changedTouches){
    if (t.identifier === TOUCH.joyId){ TOUCH.joyId = null; TOUCH.joyDX = 0; }
    delete TOUCH.pressed[t.identifier];
  }
}
cv.addEventListener('touchend', touchEnd, {passive:false});
cv.addEventListener('touchcancel', touchEnd, {passive:false});

function onPress(code) {
  if (G.scene === 'title' || G.scene === 'gameover' || G.scene === 'victory') {
    if (code === 'Space' || code === 'Enter') {
      if (G.scene !== 'title') reset();
      startStage(0);
    }
    return;
  }
  if (G.scene === 'clear') {
    if (code === 'Space' || code === 'Enter') startStage(G.stage + 1);
    return;
  }
  if (G.scene !== 'play') return;
  if (code === 'Space') jump();
  if (code === 'KeyQ') trySuck();
  if (code === 'KeyW') fire();
  if (code === 'KeyE') dash();
  if (code === 'KeyR') throwBomb();
}

function startStage(i) {
  if (i >= STAGES.length) { G.scene = 'victory'; return; }
  G.stage = i; G.scene = 'play';
  G.slimes = []; G.shots = []; G.bombsFly = []; G.items = []; G.parts = []; G.pops = [];
  G.obstacles = []; G.obsT = 7;
  G.spawnT = 2.5; G.bossIntro = 0; G.nameT = 2.5;
  G.levelLen = 5200 + i * 700; // 더 긴 맵
  G.camX = 0; G.arena = false;
  const p = G.player;
  p.x = 120; p.y = GROUND; p.vx = p.vy = 0; p.inv = 1.5; p.jumps = 0;
  p.hp = Math.min(p.maxHp, p.hp + 1);
  p.loaded = null; p.suckTarget = null; p.dash = 0; p.dir = 1;
  const st = STAGES[i];
  G.boss = { x:G.levelLen - 190, y:GROUND, vx:0, vy:0, r:62, hp:st.bossHP, maxHp:st.bossHP,
             dir:-1, hopT:1.5, hurt:0, awake:false, land:0 };
  // 구덩이 (떨어지면 하트 -1 후 리스폰)
  G.pits = [];
  let pxx = 1000;
  for (let k = 0; k < 2 + Math.floor(i/2) + 1; k++) {
    pxx += 650 + Math.random()*750;
    if (pxx > G.levelLen - 1100) break;
    const pw = 120 + Math.random()*70;
    G.pits.push({ x0: Math.round(pxx/SC)*SC, x1: Math.round((pxx+pw)/SC)*SC });
    pxx += pw;
  }
  // 장애물 패턴 배치
  let ox = 480;
  while (ox < G.levelLen - 900) {
    const bxp = ox + Math.random()*140;
    if (!nearPit(bxp, 150)) placePattern(bxp);
    ox += 400 + Math.random()*400;
  }
  placeObstacle(G.levelLen - 560);
  // 슬라임 배치
  for (let sx = 560; sx < G.levelLen - 450; sx += 380 + Math.random()*280) {
    const slx = sx + Math.random()*120;
    if (!nearPit(slx, 70)) G.slimes.push(makeSlime(slx));
  }
}

function overPit(x){ return G.pits.some(t => x > t.x0 && x < t.x1); }
function nearPit(x, m){ return G.pits.some(t => x > t.x0 - m && x < t.x1 + m); }

function makeSlime(x) {
  const tough = G.stage >= 2 && Math.random() < .35;
  return { x, y: GROUND, vx:0, vy:0, r: tough?20:16, hp: tough?2:1, tough,
           dir: Math.random()<.5?-1:1, hopT: Math.random()*1.2, hurt:0, sucked:0, land:0 };
}

const OBS_TYPES = ['crate','barrel','rock'];
function placeObstacle(x, opts={}) {
  const type = opts.type || OBS_TYPES[(Math.random()*OBS_TYPES.length)|0];
  let w, h;
  if (type === 'crate')  { w = 38 + Math.random()*42; h = 38 + Math.random()*62; }
  if (type === 'barrel') { w = 34 + Math.random()*18; h = 52 + Math.random()*42; }
  if (type === 'rock')   { w = 46 + Math.random()*48; h = 34 + Math.random()*40; }
  if (opts.w) w = opts.w;
  if (opts.h) h = opts.h;
  w = Math.round(w/SC)*SC; h = Math.round(h/SC)*SC;
  const yb = Math.round((opts.yb ?? GROUND)/SC)*SC; // 바닥 y (공중 발판 지원)
  G.obstacles.push({ x: Math.round(x/SC)*SC, w, h, yb, hp:2, hurt:0, type, wob:(Math.random()*100)|0 });
}
function placePattern(x) {
  const r = Math.random();
  if (r < .35) placeObstacle(x); // 단일
  else if (r < .62) { // 계단식으로 나란히 쌓기 (2~3단)
    const n = 2 + (Math.random()*2|0);
    const cw = 48, dirn = Math.random()<.5 ? 1 : -1;
    for (let i2=0;i2<n;i2++)
      placeObstacle(x + dirn*i2*cw, { type:'crate', w:cw, h:45*(i2+1) });
  } else if (r < .8) { // 수직으로 2단 쌓기
    const bw2 = 54 + Math.random()*18;
    const h1 = 45 + Math.random()*24, h2 = 42 + Math.random()*21;
    placeObstacle(x, { type:'crate', w:bw2, h:h1 });
    placeObstacle(x, { type:'crate', w:bw2*0.8, h:h2, yb: GROUND - (Math.round(h1/SC)*SC) });
  } else { // 공중 부양 발판
    placeObstacle(x, { type:'crate', w: 96 + Math.random()*60, h: 27,
                       yb: GROUND - (99 + Math.random()*54) });
  }
}
function spawnObstacleAhead() {
  const cam = G.camX;
  const x = cam + W + 100 + Math.random()*280;
  if (x > G.levelLen - 420) return;
  if (nearPit(x, 150)) return;
  if (G.obstacles.some(o => Math.abs(o.x - x) < 130)) return;
  if (Math.random() < .75) placeObstacle(x);
  else placeObstacle(x, { type:'crate', w: 100 + Math.random()*50, h: 27,
                          yb: GROUND - (99 + Math.random()*54) });
}

/* ---------------- 플레이어 동작 ---------------- */
function jump() {
  const p = G.player;
  if (p.onGround || p.coyote > 0) {
    p.vy = -13.2; p.onGround = false; p.coyote = 0; p.jumps = 1; p.squash = -.3;
  }
  else if (p.airJump) { p.vy = -10.5; p.airJump = false; puff(p.x, p.y, '#fff'); }
  else if (p.jumps < 2) {
    p.vy = -11; p.jumps = 2; p.squash = -.25;
    puff(p.x, p.y, '#ffffff', 10, 3);
  }
}
function dash() {
  const p = G.player;
  if (p.dash > 0 || p.dashCd > 0) return;
  let d = p.dir;
  if (keys['ArrowLeft']) d = -1;
  if (keys['ArrowRight']) d = 1;
  if (TOUCH.move) d = TOUCH.move;
  p.dash = .28; p.dashDir = d; p.dashCd = .9; p.vy = 0;
}
function trySuck() {
  const p = G.player;
  if (p.loaded || p.suckTarget) return;
  let best = null, bd = 170;
  for (const s of G.slimes) {
    if (s.sucked) continue;
    const d = Math.hypot(s.x - p.x, s.y - 20 - (p.y - 24));
    if (d < bd) { bd = d; best = s; }
  }
  if (best) { best.sucked = 1; p.suckTarget = best; p.suck = 0; }
  else puff(p.x + p.dir*30, p.y - 30, 'rgba(255,255,255,.5)');
}
function fire() {
  const p = G.player;
  if (!p.loaded) return;
  G.shots.push({ x:p.x + p.dir*26, y:p.y - 30, vx:p.dir*13, vy:-1.5, color:p.loaded, r:13 });
  p.loaded = null; G.shake = Math.max(G.shake, 3);
}
function throwBomb() {
  const p = G.player;
  if (G.bombs <= 0) return;
  G.bombs--;
  G.bombsFly.push({ x:p.x + p.dir*20, y:p.y - 34, vx:p.dir*7.5, vy:-7, r:11, fuse:2.5 });
}

/* ---------------- 파티클 ---------------- */
function puff(x, y, c, n=8, sp=3) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2, v = sp*(.4+Math.random()*.8);
    G.parts.push({ x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v-1, r:3+Math.random()*4, c, t:.5+Math.random()*.3 });
  }
}
function popText(x, y, txt, c) { G.pops.push({ x, y, txt, c, t:1 }); }

/* ---------------- 처치/드롭 ---------------- */
function hitSlime(s, dmg) {
  s.hp -= dmg; s.hurt = .2;
  puff(s.x, s.y - s.r, STAGES[G.stage].slime, 10, 4);
  if (s.hp <= 0) {
    G.slimes.splice(G.slimes.indexOf(s), 1);
    puff(s.x, s.y - s.r, s.tough ? STAGES[G.stage].tough : STAGES[G.stage].slime, 16, 5);
    if (Math.random() < .5) G.items.push({ x:s.x-10, y:s.y-s.r, vx:-1.2, vy:-5, kind:'coin', t:9 });
    if (Math.random() < .3) G.items.push({ x:s.x+10, y:s.y-s.r, vx:1.2, vy:-6, kind:'bomb', t:9 });
  }
}
function hitObstacle(o, dmg) {
  o.hp -= dmg; o.hurt = .2;
  puff(o.x, o.yb - o.h/2, o.type==='rock' ? '#9a9aa5' : '#caa055', 8, 4);
  if (o.hp <= 0) {
    G.obstacles.splice(G.obstacles.indexOf(o), 1);
    puff(o.x, o.yb - o.h/2, o.type==='rock' ? '#7d7d88' : '#a8784a', 18, 6);
    G.shake = Math.max(G.shake, 4);
    if (Math.random() < .4) G.items.push({ x:o.x, y:o.yb-o.h, vx:0, vy:-5, kind:'coin', t:9 });
  }
}
function hitBoss(dmg) {
  const b = G.boss; if (!b || b.hp<=0) return;
  if (!b.awake) { b.awake = true; G.bossIntro = 2.5; }
  b.hp -= dmg; b.hurt = .35; G.shake = Math.max(G.shake, 5);
  // 넉백: 플레이어 반대 방향으로 밀려남
  b.vx = (b.x >= G.player.x ? 1 : -1) * (4.5 + dmg);
  if (b.y >= GROUND - 2) b.vy = -3.5;
  b.hopT = Math.max(b.hopT, .5);
  popText(b.x, b.y - b.r*2 - 10, '-' + dmg, '#ff5d8f');
  puff(b.x, b.y - b.r, STAGES[G.stage].boss, 14, 6);
  if (b.hp <= 0) {
    puff(b.x, b.y - b.r, STAGES[G.stage].boss, 40, 9);
    G.coins += 20; popText(b.x, b.y - b.r*2, '+20 COIN!', '#ffd84d');
    setTimeout(() => { if (G.scene==='play') G.scene = (G.stage===STAGES.length-1)?'victory':'clear'; }, 800);
  }
}
function explode(x, y) {
  G.shake = Math.max(G.shake, 10);
  puff(x, y, '#ffae3d', 26, 8); puff(x, y, '#fff1c2', 16, 5);
  G.parts.push({ x, y, vx:0, vy:0, r:120, c:'ring', t:.3 });
  const R = 130;
  for (const s of [...G.slimes]) if (!s.sucked && Math.hypot(s.x-x, s.y-s.r-y) < R+s.r) hitSlime(s, 3);
  for (const o of [...G.obstacles]) if (Math.hypot(o.x-x, (o.yb-o.h/2)-y) < R+34) hitObstacle(o, 3);
  const b = G.boss;
  if (b && b.hp>0 && Math.hypot(b.x-x, b.y-b.r-y) < R+b.r) hitBoss(3);
}
function damagePlayer() {
  const p = G.player;
  if (p.inv > 0 || p.dash > 0) return;
  p.hp--; p.inv = 1.4; G.shake = Math.max(G.shake, 7);
  p.vy = -7; p.vx = -p.dir*6;
  if (p.hp <= 0) { G.scene = 'gameover'; }
}

/* ---------------- 업데이트 ---------------- */
function update(dt) {
  G.time += dt;
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt*30);
  if (G.nameT > 0) G.nameT -= dt;
  updateFx(dt);
  if (G.scene !== 'play') return;

  const p = G.player, st = STAGES[G.stage], b = G.boss;

  if (!G.arena && p.x > G.levelLen - 620) {
    G.arena = true;
    if (!b.awake) { b.awake = true; G.bossIntro = 2.5; G.shake = Math.max(G.shake, 8); }
  }

  if (p.dash > 0) {
    p.dash -= dt;
    p.vx = p.dashDir * 17; p.vy = 0;
    if (Math.random()<.6) puff(p.x, p.y-20, 'rgba(255,255,255,.7)', 1, 1);
  } else {
    TOUCH.move = TOUCH.joyId !== null ? (TOUCH.joyDX < -14 ? -1 : (TOUCH.joyDX > 14 ? 1 : 0)) : 0;
    const ax = ((keys['ArrowRight']?1:0) - (keys['ArrowLeft']?1:0)) || TOUCH.move;
    if (ax) { p.dir = ax; p.vx += ax * 60 * dt; }
    p.vx *= p.onGround ? .82 : .9;
    p.vx = Math.max(-6.5, Math.min(6.5, p.vx));
    p.vy += 38 * dt;
  }
  if (p.dashCd > 0) p.dashCd -= dt;
  if (p.inv > 0) p.inv -= dt;
  p.squash += (0 - p.squash) * 10 * dt;
  const py = p.y;
  p.x += p.vx; p.y += p.vy;
  const minX = G.arena ? G.levelLen - W + 24 : 20;
  p.x = Math.max(minX, Math.min(G.levelLen - 20, p.x));
  if (p.y >= GROUND && !overPit(p.x)) {
    if (!p.onGround && p.vy > 6) p.squash = .25;
    p.y = GROUND; p.vy = 0; p.onGround = true; p.airJump = false; p.jumps = 0;
  } else p.onGround = false;

  /* --- 낙사 (구덩이) --- */
  if (p.y > H + 80) {
    p.hp--; G.shake = Math.max(G.shake, 8);
    if (p.hp <= 0) { G.scene = 'gameover'; return; }
    const pit = G.pits.find(t => p.x > t.x0 - 60 && p.x < t.x1 + 60);
    p.x = pit ? pit.x0 - 70 : Math.max(60, p.x - 180);
    p.y = GROUND; p.vy = 0; p.vx = 0; p.onGround = true;
    p.inv = 1.6; p.jumps = 0; p.dash = 0;
    popText(p.x, p.y - 90, '-1 HP!', '#ff4f6e');
  }

  /* --- 장애물 충돌 (플레이어) --- */
  for (const o of G.obstacles) {
    const top = o.yb - o.h, L = o.x - o.w/2, R2 = o.x + o.w/2;
    if (p.x + 13 > L && p.x - 13 < R2 && p.y > top && p.y - p.h < o.yb) {
      if (p.vy >= 0 && py <= top + 6) { // 위에서 착지 → 발판
        if (!p.onGround && p.vy > 6) p.squash = .25;
        p.y = top; p.vy = 0; p.onGround = true; p.airJump = false; p.jumps = 0;
      } else if (p.vy < 0 && py - p.h >= o.yb - 4) { // 아래에서 머리 부딪힘
        p.y = o.yb + p.h; p.vy = 0;
      } else { // 옆에서 충돌 → 밀어내기
        p.x = p.x < o.x ? L - 13 : R2 + 13;
        p.vx = 0;
      }
    }
    if (o.hurt > 0) o.hurt -= dt;
  }
  if (p.onGround) p.coyote = .1; else p.coyote -= dt;

  const camTarget = G.arena ? G.levelLen - W
                            : Math.max(0, Math.min(G.levelLen - W, p.x - W*0.42));
  G.camX += (camTarget - G.camX) * Math.min(1, 8*dt);

  if (p.suckTarget) {
    p.suck += dt * 4.5;
    const s = p.suckTarget;
    s.x += (p.x - s.x) * 12 * dt; s.y += (p.y - 26 - s.y) * 12 * dt;
    s.r *= 1 - 2.2*dt;
    if (p.suck >= 1 || Math.hypot(s.x-p.x, s.y-(p.y-26)) < 12) {
      p.loaded = s.tough ? st.tough : st.slime;
      G.slimes.splice(G.slimes.indexOf(s),1);
      p.suckTarget = null;
      puff(p.x, p.y-30, p.loaded, 8, 3);
    }
  }

  G.spawnT -= dt;
  const nearCount = G.slimes.filter(s => Math.abs(s.x - p.x) < 900).length;
  if (G.spawnT <= 0 && nearCount < 6) {
    if (G.arena) {
      const s = makeSlime(G.camX + 80 + Math.random()*(W-160));
      s.y = -30; G.slimes.push(s);
    } else {
      const sx = Math.min(G.levelLen - 60, G.camX + W + 60 + Math.random()*220);
      if (!nearPit(sx, 60)) G.slimes.push(makeSlime(sx));
    }
    G.spawnT = 1.8 + Math.random();
  }

  G.obsT -= dt;
  if (G.obsT <= 0) { if (!G.arena) spawnObstacleAhead(); G.obsT = 6 + Math.random()*5; }

  for (const s of [...G.slimes]) {
    if (s.sucked) continue;
    if (s.hurt > 0) s.hurt -= dt;
    if (s.land > 0) s.land -= dt;
    s.hopT -= dt;
    s.vy += 34 * dt;
    if (s.hopT <= 0 && s.y >= GROUND && !overPit(s.x)) {
      if (Math.abs(s.x - p.x) < 780) s.dir = p.x > s.x ? 1 : -1;
      else if (Math.random() < .4) s.dir = -s.dir;
      s.vx = s.dir * (1.6 + Math.random()*1.4);
      s.vy = -7 - Math.random()*3;
      s.hopT = .9 + Math.random()*.9;
    }
    s.x += s.vx; s.y += s.vy;
    if (s.y >= GROUND && !overPit(s.x)) {
      if (s.vy > 4) s.land = .16; // 착지 스쿼시
      s.y = GROUND; s.vy = 0; s.vx *= .6;
    }
    if (s.y > H + 200) { G.slimes.splice(G.slimes.indexOf(s),1); continue; } // 구덩이 낙사
    s.x = Math.max(20, Math.min(G.levelLen - 20, s.x));

    const dx = Math.abs(s.x - p.x), topS = s.y - s.r*2;
    if (dx < s.r + 14 && p.y > topS - 6 && p.y - p.h < s.y) {
      const stomp = p.vy > 2 && (p.y - p.h/2) < topS + 10;
      if (stomp) {
        hitSlime(s, 1);
        p.vy = -9.5; p.airJump = true; p.jumps = 1; p.squash = -.25;
        popText(p.x, p.y - 60, 'STOMP!', '#fff');
      } else if (p.dash <= 0) damagePlayer();
    }
  }

  if (G.bossIntro > 0) G.bossIntro -= dt;
  if (b && b.hp > 0 && b.awake) {
    if (b.hurt > 0) b.hurt -= dt;
    if (b.land > 0) b.land -= dt;
    b.hopT -= dt; b.vy += 30 * dt;
    if (b.hopT <= 0 && b.y >= GROUND) {
      b.dir = p.x > b.x ? 1 : -1;
      const big = Math.random() < .3;
      b.vx = b.dir * (big ? 5.5 : 2.4);
      b.vy = big ? -13 : -8;
      b.hopT = 1.3 + Math.random()*1.2;
    }
    b.x += b.vx; b.y += b.vy;
    if (b.y >= GROUND) {
      if (b.vy > 6) { b.land = .18; }
      if (b.vy > 8) { G.shake = Math.max(G.shake, 5); puff(b.x, GROUND, st.gTopHi, 10, 4); }
      b.y = GROUND; b.vy = 0; b.vx *= .7;
    }
    b.x = Math.max(G.levelLen - W + 70, Math.min(G.levelLen - 70, b.x));
  }
  if (b && b.hp > 0 && b.awake &&
      Math.abs(b.x-p.x) < b.r+10 && p.y > b.y-b.r*2 && p.y-p.h < b.y) {
    if (p.dash <= 0) damagePlayer();
  }

  for (const sh of [...G.shots]) {
    sh.vy += 14*dt; sh.x += sh.vx; sh.y += sh.vy;
    let dead = Math.abs(sh.x - p.x) > 950 || sh.y > GROUND + 10;
    for (const s of G.slimes) {
      if (!s.sucked && Math.hypot(s.x-sh.x, s.y-s.r-sh.y) < s.r+sh.r) { hitSlime(s,1); dead=true; break; }
    }
    if (!dead) for (const o of G.obstacles) {
      if (Math.abs(sh.x-o.x) < o.w/2+sh.r && sh.y > o.yb-o.h-sh.r && sh.y < o.yb+sh.r) { hitObstacle(o,1); dead=true; break; }
    }
    if (!dead && b && b.hp>0 && Math.hypot(b.x-sh.x, b.y-b.r-sh.y) < b.r+sh.r) { hitBoss(1); dead=true; }
    if (dead) { puff(sh.x, sh.y, sh.color, 8, 4); G.shots.splice(G.shots.indexOf(sh),1); }
  }

  for (const bm of [...G.bombsFly]) {
    bm.vy += 24*dt; bm.x += bm.vx; bm.y += bm.vy; bm.fuse -= dt;
    let boom = bm.fuse<=0 || (bm.y>=GROUND && !overPit(bm.x));
    if (bm.y > H + 200) { G.bombsFly.splice(G.bombsFly.indexOf(bm),1); continue; }
    if (!boom) {
      for (const s of G.slimes) if (!s.sucked && Math.hypot(s.x-bm.x,s.y-s.r-bm.y)<s.r+bm.r) { boom=true; break; }
      if (!boom && b && b.hp>0 && Math.hypot(b.x-bm.x,b.y-b.r-bm.y)<b.r+bm.r) boom=true;
      if (!boom) for (const o of G.obstacles) if (Math.abs(bm.x-o.x)<o.w/2+bm.r && bm.y>o.yb-o.h-bm.r && bm.y<o.yb+bm.r) { boom=true; break; }
    }
    if (boom) { explode(bm.x, Math.min(bm.y, GROUND)); G.bombsFly.splice(G.bombsFly.indexOf(bm),1); }
  }

  for (const it of [...G.items]) {
    it.vy += 26*dt; it.x += it.vx; it.y += it.vy; it.t -= dt;
    if (it.y >= GROUND && !overPit(it.x)) { it.y = GROUND; it.vy *= -.45; it.vx *= .8; }
    if (it.y > H + 200) { G.items.splice(G.items.indexOf(it),1); continue; }
    if (Math.hypot(it.x-p.x, it.y-(p.y-24)) < 30) {
      if (it.kind==='coin') { G.coins++; popText(it.x, it.y-20, '+1 COIN', '#ffd84d'); }
      else { G.bombs++; popText(it.x, it.y-20, '+1 BOMB', '#ff8b5e'); }
      G.items.splice(G.items.indexOf(it),1);
    } else if (it.t<=0) G.items.splice(G.items.indexOf(it),1);
  }
}

function updateFx(dt) {
  for (const q of [...G.parts]) {
    q.t -= dt;
    if (q.c==='ring') { if (q.t<=0) G.parts.splice(G.parts.indexOf(q),1); continue; }
    q.x += q.vx; q.y += q.vy; q.vy += 8*dt;
    if (q.t<=0) G.parts.splice(G.parts.indexOf(q),1);
  }
  for (const pp of [...G.pops]) { pp.t -= dt; pp.y -= 30*dt; if (pp.t<=0) G.pops.splice(G.pops.indexOf(pp),1); }
}

/* ================ 도트 렌더링 ================ */
const bx = v => Math.round(v/SC);

function lerpHex(a, b, t) {
  const pa=parseInt(a.slice(1),16), pb=parseInt(b.slice(1),16);
  const r=((pa>>16)+(((pb>>16)-(pa>>16))*t))|0;
  const g2=(((pa>>8)&255)+((((pb>>8)&255)-((pa>>8)&255))*t))|0;
  const bl=((pa&255)+(((pb&255)-(pa&255))*t))|0;
  return 'rgb('+r+','+g2+','+bl+')';
}
function hash(n){ return Math.abs((Math.sin(n*127.1)*43758.5453)%1); }

/* --- 배경 (저해상도 버퍼) --- */
function drawBG(camB) {
  const st = STAGES[G.stage];
  const bg = 157; // 버퍼 지면 y
  // 밴딩 처리된 하늘 (레트로 그라데이션)
  const bands = 6, bandH = Math.ceil(bg/bands);
  for (let i=0;i<bands;i++){
    px.fillStyle = lerpHex(st.sky[0], st.sky[1], i/(bands-1));
    px.fillRect(0, i*bandH, BW, bandH);
  }
  // 눈/불티
  if (st.deco==='snow' || st.deco==='lava') {
    px.fillStyle = st.deco==='snow' ? '#ffffff' : '#ffae3d';
    for (let i=0;i<18;i++){
      const x=((i*47 + G.time*(st.deco==='snow'?5:-9))%BW+BW)%BW;
      const y=((i*31 + G.time*(st.deco==='snow'?9:-13))%bg+bg)%bg;
      px.fillRect(x|0, st.deco==='snow'?y|0:(bg-y)|0, 1, 1);
    }
  }
  // 구름 (도트 구름)
  for (let i=0;i<3;i++){
    const cx=(((i*120 + G.time*4 - camB*0.12)%(BW+50))+(BW+50))%(BW+50) - 25;
    const cy=18+i*13;
    px.fillStyle='rgba(255,255,255,.9)';
    px.fillRect(cx|0, cy, 18, 5);
    px.fillRect((cx+3)|0, cy-3, 8, 3);
    px.fillRect((cx+10)|0, cy-2, 6, 2);
  }
  // 언덕 2겹 (패럴랙스, 계단식 실루엣)
  drawHillLayer(camB*0.35, st.hill,  bg, 26, 90);
  drawHillLayer(camB*0.55, st.hill2, bg, 16, 66);
  // 테마 장식 (월드 고정)
  const k0 = Math.floor((camB-40)/120), k1 = Math.floor((camB+BW+40)/120);
  for (let k=k0;k<=k1;k++){
    const wx = k*120 + (hash(k)*46|0) + 20;
    const sx = (wx - camB)|0;
    drawDeco(st.deco, sx, bg, k);
  }
  // 땅: 흙 + 잔디 밴드
  px.fillStyle=st.ground; px.fillRect(0,bg,BW,BH-bg);
  px.fillStyle=st.groundTop; px.fillRect(0,bg,BW,4);
  px.fillStyle=st.gTopHi; px.fillRect(0,bg,BW,1);
  // 잔디 이빨 무늬 + 흙 알갱이 (월드 고정)
  const t0 = Math.floor(camB/8)-1, t1 = Math.floor((camB+BW)/8)+1;
  for (let k=t0;k<=t1;k++){
    const sx = k*8 - camB;
    px.fillStyle=st.groundTop;
    px.fillRect(sx|0, bg+4, 3, 1);
    px.fillStyle='rgba(0,0,0,.25)';
    px.fillRect((sx + (hash(k)*6|0))|0, bg+8+(hash(k*7)*10|0), 2, 1);
    if (hash(k*3)>.5){ px.fillStyle='rgba(255,255,255,.15)';
      px.fillRect((sx+3)|0, bg+13+(hash(k*11)*7|0), 1, 1); }
  }
  // 구덩이 (낭떠러지)
  for (const t of G.pits){
    const x0 = bx(t.x0) - camB, x1 = bx(t.x1) - camB;
    if (x1 < -4 || x0 > BW+4) continue;
    px.fillStyle='#100820';
    px.fillRect(x0, bg, x1-x0, BH-bg);
    px.fillStyle='rgba(90,40,110,.45)'; // 어둠으로 빨려드는 깊이
    px.fillRect(x0, bg, x1-x0, 2);
    px.fillStyle='rgba(0,0,0,.5)';       // 절벽 단면
    px.fillRect(x0, bg, 2, BH-bg); px.fillRect(x1-2, bg, 2, BH-bg);
    px.fillStyle=st.gTopHi;              // 가장자리 풀 삐죽
    px.fillRect(x0-1, bg, 1, 2); px.fillRect(x1, bg, 1, 2);
  }
}
function drawHillLayer(off, color, bg, amp, wl) {
  px.fillStyle=color;
  for (let x=0;x<BW;x++){
    const wxp = x + off;
    const hgt = amp*0.6 + Math.sin(wxp/wl)*amp*0.4 + Math.sin(wxp/(wl*0.37))*amp*0.2;
    const q = Math.round(hgt/3)*3; // 계단식 양자화 → 도트 능선
    px.fillRect(x, bg-q, 1, q);
  }
}
function drawDeco(deco, sx, bg, k) {
  if (sx<-40 || sx>BW+40) return;
  if (deco==='tree'){
    px.fillStyle='#6e4632'; px.fillRect(sx-2, bg-24, 4, 24);
    px.fillStyle='#3f8f2f'; px.fillRect(sx-9, bg-34, 18, 12);
    px.fillStyle='#5cb85c'; px.fillRect(sx-7, bg-42, 14, 10);
    px.fillRect(sx-4, bg-48, 8, 7);
    px.fillStyle='#8fd96e'; px.fillRect(sx-3, bg-47, 3, 2); px.fillRect(sx-6, bg-40, 3, 2);
  } else if (deco==='cactus'){
    px.fillStyle='#3f8f4a';
    px.fillRect(sx-2, bg-26, 5, 26);
    px.fillRect(sx-9, bg-20, 7, 3); px.fillRect(sx-9, bg-20, 3, 9);
    px.fillRect(sx+3, bg-15, 7, 3); px.fillRect(sx+7, bg-15, 3, 7);
    px.fillStyle='#6ec97a'; px.fillRect(sx-1, bg-25, 1, 20);
  } else if (deco==='wave' && hash(k*3)>.35){
    px.fillStyle='#e8d28a'; px.fillRect(sx-6, bg-3, 12, 3);
    px.fillStyle='#3f8f4a'; px.fillRect(sx-1, bg-14, 3, 11);
    px.fillRect(sx-5, bg-12, 4, 2); px.fillRect(sx+2, bg-10, 4, 2);
  } else if (deco==='snow' && hash(k*3)>.4){
    px.fillStyle='#ffffff';
    for(let r=0;r<9;r++) px.fillRect(sx-r, bg-27+r*3, r*2+1, 3);
    px.fillStyle='#aecfe8';
    px.fillRect(sx-2, bg-21, 2, 3); px.fillRect(sx+1, bg-18, 3, 3);
  } else if (deco==='lava' && hash(k*5)>.45){
    px.fillStyle='#241315';
    for(let r=0;r<8;r++) px.fillRect(sx-r, bg-22+r*3, r*2+1, 3);
    px.fillStyle='#ff7a30';
    px.fillRect(sx-1, bg-24, 3, 2+((Math.sin(G.time*5+k)+1)*1.5|0));
  }
}

/* --- 장애물 (도트) --- */
function drawObstacleP(o, camB) {
  const w = bx(o.w), h = bx(o.h);
  const x = bx(o.x) - (w>>1) - camB, y = bx(o.yb) - h;
  const shake = o.hurt>0 ? ((Math.random()*3|0)-1) : 0;
  px.save(); px.translate(x+shake, y);
  if (o.type==='crate'){
    px.fillStyle='#a8722f'; px.fillRect(0,0,w,h);
    px.fillStyle='#c9944a'; px.fillRect(1,1,w-2,h-2);
    px.fillStyle='#8a5a24';
    px.fillRect(1,(h>>1)-1,w-2,1);
    for(let i=0;i<Math.min(w,h)-4;i++){
      px.fillRect(2+i,2+((h-4)*i/(w-4))|0,1,1);
      px.fillRect(w-3-i,2+((h-4)*i/(w-4))|0,1,1);
    }
    px.fillStyle=K; px.fillRect(0,0,w,1); px.fillRect(0,h-1,w,1);
    px.fillRect(0,0,1,h); px.fillRect(w-1,0,1,h);
    px.fillStyle='#ffdf9e'; px.fillRect(2,1,3,1);
  } else if (o.type==='barrel'){
    px.fillStyle='#8a5a24'; px.fillRect(1,0,w-2,h);
    px.fillRect(0,1,w,h-2);
    px.fillStyle='#a8722f'; px.fillRect(2,1,w-4,h-2);
    px.fillStyle='#4a3010';
    px.fillRect(0,(h*0.28)|0,w,2); px.fillRect(0,(h*0.68)|0,w,2);
    px.fillStyle='#d9a862'; px.fillRect(3,2,2,h-4);
    px.fillStyle=K;
    px.fillRect(1,0,w-2,1); px.fillRect(1,h-1,w-2,1);
    px.fillRect(0,1,1,h-2); px.fillRect(w-1,1,1,h-2);
  } else { // rock
    px.fillStyle='#6e6e7d';
    px.fillRect(0,(h*0.4)|0,w,h-((h*0.4)|0));
    px.fillRect(2,(h*0.15)|0,w-4,h-((h*0.15)|0));
    px.fillRect(4,0,w-8-(hash(o.wob)*3|0),h);
    px.fillStyle='#8d8d99';
    px.fillRect(3,(h*0.2)|0,w-7,2);
    px.fillRect(2,(h*0.5)|0,3,3);
    px.fillStyle='#4a4a58';
    px.fillRect(w-5,(h*0.55)|0,3,2);
    px.fillStyle=K;
    px.fillRect(0,h-1,w,1);
  }
  if (o.hp===1){ // 금 감
    px.fillStyle=K;
    let cx=(w>>1)-2;
    for(let i=0;i<h-4;i+=2){ px.fillRect(cx+((i%4===0)?1:-1),2+i,1,2); cx+=((hash(o.wob+i)>.5)?1:-1); }
  }
  px.restore();
}

/* --- 스프라이트 도우미 --- */
function blit(spr, wx, wy, camB, flip=false, sx=1, sy=1, alpha=1) {
  const w = spr.width*sx, h = spr.height*sy;
  const x = Math.round(bx(wx) - camB - w/2), y = Math.round(bx(wy) - h);
  px.save();
  if (alpha<1) px.globalAlpha = alpha;
  if (flip){ px.translate(x+w, y); px.scale(-1,1); px.drawImage(spr, 0, 0, w, h); }
  else px.drawImage(spr, x, y, w, h);
  px.restore();
  return {x, y, w, h};
}

function drawPlayerP(camB) {
  const p = G.player;
  if (p.inv>0 && Math.floor(G.time*14)%2===0 && G.scene==='play') return;
  let spr = sprPlayerA;
  if (!p.onGround) spr = sprPlayerJ;
  else if (Math.abs(p.vx)>.5) spr = Math.floor(G.time*10)%2 ? sprPlayerB : sprPlayerA;
  const flip = p.dir<0;
  // 대쉬 잔상
  if (p.dash>0){
    blit(spr, p.x - p.dashDir*26, p.y, camB, flip, 1, 1, .25);
    blit(spr, p.x - p.dashDir*13, p.y, camB, flip, 1, 1, .45);
  }
  const bob = p.squash < -.05 ? -1 : (p.squash > .1 ? 1 : 0);
  blit(spr, p.x, p.y + bob*SC, camB, flip);
  // 흡입건
  const gx = p.x + p.dir*15, gy = p.y - 26;
  blit(sprGun, gx, gy+6, camB, flip);
  // 장전된 슬라임
  if (p.loaded){
    px.fillStyle=p.loaded;
    const lx = Math.round(bx(p.x + p.dir*13) - camB), ly = Math.round(bx(p.y)-11);
    px.fillRect(lx-2, ly-1, 4, 3);
    px.fillStyle='rgba(255,255,255,.7)'; px.fillRect(lx-1, ly-1, 1, 1);
  }
  // 흡입 빔 (점선 도트)
  if (p.suckTarget){
    const s = p.suckTarget;
    const x0=bx(p.x + p.dir*20)-camB, y0=bx(p.y)-9;
    const x1=bx(s.x)-camB, y1=bx(s.y - s.r);
    const dx=x1-x0, dy=y1-y0, len=Math.max(1,Math.hypot(dx,dy));
    const ph = (G.time*14)%3;
    px.fillStyle='rgba(255,255,255,.85)';
    for(let d=ph; d<len; d+=3){
      px.fillRect(Math.round(x0+dx*d/len), Math.round(y0+dy*d/len), 1, 1);
    }
  }
}

function drawSlimeP(s, camB) {
  const spr = s.tough ? SPR[G.stage].tough : SPR[G.stage].slime;
  let sx=1, sy=1;
  if (s.sucked) { sx = sy = Math.max(.2, s.r/16); }
  else if (s.y < GROUND - 4) { // 공중: 세로로 늘어남 (스트레치)
    const k = Math.min(1, Math.abs(s.vy)/11);
    sy = 1 + .35*k; sx = 1 - .22*k;
  } else if (s.land > 0) { // 착지: 납작해짐 (스쿼시)
    const k = Math.max(0, s.land/.16);
    sy = 1 - .35*k; sx = 1 + .3*k;
  }
  const r = blit(spr, s.x, s.y, camB, s.dir<0, sx, sy);
  if (s.hurt>0){ // 피격 화이트 플래시
    px.fillStyle='rgba(255,255,255,.6)';
    px.fillRect(r.x+1, r.y+1, Math.max(1,r.w-2), Math.max(1,r.h-2));
  }
}

function drawBossP(camB) {
  const b = G.boss;
  if (!b || b.hp<=0) return;
  const S = SPR[G.stage];
  const spr = b.hurt>0 ? S.bossHurt : (b.awake ? S.boss : S.bossSleep);
  let sx=1, sy=1;
  if (b.awake) {
    if (b.y < GROUND - 4) { // 점프 스트레치
      const k = Math.min(1, Math.abs(b.vy)/12);
      sy = 1 + .22*k; sx = 1 - .14*k;
    } else if (b.land > 0) { // 착지 스쿼시
      const k = Math.max(0, b.land/.18);
      sy = 1 - .22*k; sx = 1 + .18*k;
    }
  } else {
    sy = 1 + ((Math.floor(G.time*1.6)%2)?.03:0); // 잠들어 숨쉬기
  }
  const r = blit(spr, b.x, b.y, camB, b.dir<0 && b.awake && b.hurt<=0, sx, sy);
  // 왕관 (머리 위를 따라다님)
  px.drawImage(sprCrown, Math.round(bx(b.x)-camB-11), r.y-5, 22, 9);
}

function drawFlag(camB) {
  const x = bx(G.levelLen-330) - camB, bg=157;
  px.fillStyle='#6e4632'; px.fillRect(x, bg-38, 2, 38);
  px.fillStyle='#ff4f6e';
  px.fillRect(x+2, bg-38, 12, 4);
  px.fillRect(x+2, bg-34, 9, 3);
  px.fillRect(x+2, bg-31, 5, 2);
  px.fillStyle='#ffd84d'; px.fillRect(x-1, bg-40, 4, 2);
}

/* --- 픽셀 Zzz --- */
function drawZ(x, y, s) {
  px.fillStyle='rgba(255,255,255,.9)';
  px.fillRect(x, y, s*3, s);
  px.fillRect(x+s*2, y+s, s, s);
  px.fillRect(x+s, y+s*2, s, s);
  px.fillRect(x, y+s*3, s*3, s);
}

/* --- 월드 렌더 (버퍼) --- */
function renderWorld() {
  const camB = Math.round(G.camX/SC);
  px.clearRect(0,0,BW,BH);
  drawBG(camB);
  drawFlag(camB);
  for (const o of G.obstacles) drawObstacleP(o, camB);
  // 아이템
  for (const it of G.items){
    if (it.t<2 && Math.floor(G.time*10)%2) continue;
    const bob = Math.floor(G.time*4+it.x)%2;
    const spr = it.kind==='coin' ? sprCoin : sprBomb;
    blit(spr, it.x, it.y - 4 + bob*SC, camB);
  }
  for (const s of G.slimes) drawSlimeP(s, camB);
  drawBossP(camB);
  const b=G.boss;
  if (b && !b.awake && b.hp>0){
    const zx = bx(b.x)-camB+18, zy = bx(b.y)-58 - ((Math.sin(G.time*2)+1)*2|0);
    drawZ(zx, zy, 2); drawZ(zx+9, zy-7, 1);
  }
  // 발사체(슬라임 그대로 날아감, 살짝 늘어난 모션)
  for (const sh of G.shots){
    const spr = SPR[G.stage].slime;
    blit(spr, sh.x, sh.y+sh.r, camB, sh.vx<0, 1.15, .85);
    px.fillStyle='rgba(255,255,255,.5)';
    px.fillRect(Math.round(bx(sh.x-sh.vx*2))-camB, Math.round(bx(sh.y)), 2, 1);
  }
  // 폭탄
  for (const bm of G.bombsFly){
    blit(sprBomb, bm.x, bm.y+8, camB);
    if (Math.floor(G.time*10)%2){ px.fillStyle='#ffdf60';
      px.fillRect(Math.round(bx(bm.x))-camB+2, Math.round(bx(bm.y))-4, 1, 1); }
  }
  // 파티클 (사각 도트)
  for (const q of G.parts){
    if (q.c==='ring'){
      px.strokeStyle='rgba(255,190,70,'+Math.min(1,q.t*3)+')';
      px.lineWidth=2;
      px.beginPath();
      px.arc(bx(q.x)-camB, bx(q.y), bx(q.r)*(1.3-q.t*1.2), 0, 7);
      px.stroke(); continue;
    }
    px.globalAlpha=Math.max(0,Math.min(1,q.t*1.6)); px.fillStyle=q.c;
    const sz = q.r>5?2:1;
    px.fillRect(Math.round(bx(q.x))-camB, Math.round(bx(q.y)), sz, sz);
    px.globalAlpha=1;
  }
  drawPlayerP(camB);
}

/* ================ RPG 윈도우 UI (고해상도) ================ */
function winBox(x, y, w, h) {
  // 그림자
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(x+4, y+4, w, h);
  // 본체 (쯔꾸르 파란 윈도우)
  const g = ctx.createLinearGradient(0, y, 0, y+h);
  g.addColorStop(0, 'rgba(58,88,200,.92)');
  g.addColorStop(1, 'rgba(18,30,102,.92)');
  ctx.fillStyle = g; ctx.fillRect(x+3, y+3, w-6, h-6);
  // 흰 테두리 (모서리 도트 처리)
  ctx.fillStyle='#f2ead8';
  ctx.fillRect(x+6, y, w-12, 3);   ctx.fillRect(x+6, y+h-3, w-12, 3);
  ctx.fillRect(x, y+6, 3, h-12);   ctx.fillRect(x+w-3, y+6, 3, h-12);
  ctx.fillRect(x+3, y+3, 3, 3);    ctx.fillRect(x+w-6, y+3, 3, 3);
  ctx.fillRect(x+3, y+h-6, 3, 3);  ctx.fillRect(x+w-6, y+h-6, 3, 3);
  // 안쪽 하이라이트
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.fillRect(x+6, y+5, w-12, 2);
}
function pxText(t, x, y, size, color, align='left') {
  ctx.font = size+'px '+FONT;
  ctx.textAlign = align;
  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.fillText(t, x+2, y+2);
  ctx.fillStyle=color;
  ctx.fillText(t, x, y);
  ctx.textAlign='left';
}
function pxBar(x, y, w, h, ratio, fg, bg) {
  ctx.fillStyle=K; ctx.fillRect(x-2, y-2, w+4, h+4);
  ctx.fillStyle=bg; ctx.fillRect(x, y, w, h);
  const fw = Math.round(w*Math.max(0,Math.min(1,ratio))/3)*3;
  if (fw>0){ ctx.fillStyle=fg; ctx.fillRect(x, y, fw, h);
    ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fillRect(x, y, fw, 3); }
}

/* ---------------- 터치 컨트롤 그리기 ---------------- */
function pxCircle(cx2, cy2, r, fill, border){
  ctx.fillStyle=border;
  ctx.beginPath(); ctx.arc(cx2, cy2, r+4, 0, 7); ctx.fill();
  ctx.fillStyle='#241633';
  ctx.beginPath(); ctx.arc(cx2, cy2, r+1, 0, 7); ctx.fill();
  ctx.fillStyle=fill;
  ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, 7); ctx.fill();
}
function drawTouchControls(){
  const p = G.player;
  ctx.save(); ctx.globalAlpha = .62;
  // 왼쪽: 가상 조이스틱
  pxCircle(JOY.x, JOY.y, JOY.r, 'rgba(24,32,90,.55)', 'rgba(242,234,216,.85)');
  ctx.fillStyle='rgba(242,234,216,.5)';
  ctx.font='20px '+FONT; ctx.textAlign='center';
  ctx.fillText('◀', JOY.x-42, JOY.y+8); ctx.fillText('▶', JOY.x+42, JOY.y+8);
  pxCircle(JOY.x + TOUCH.joyDX*.8, JOY.y, JOY.knob,
           TOUCH.joyId!==null ? '#5fe0c8' : 'rgba(242,234,216,.9)', '#241633');
  // 오른쪽: 버튼
  for (const b of BTNS){
    let fill='rgba(24,32,90,.62)', label=b.label, sub='';
    const held = Object.values(TOUCH.pressed).includes(b.id);
    if (b.id==='shot'){
      label = p.loaded ? '발사' : '흡입';
      if (p.loaded) fill='rgba(224,51,107,.78)';
    }
    if (b.id==='dash' && p.dashCd>0) fill='rgba(40,40,60,.5)';
    if (b.id==='bomb'){ sub='x'+G.bombs; if (G.bombs<=0) fill='rgba(40,40,60,.5)'; }
    if (held) fill='rgba(95,224,200,.85)';
    pxCircle(b.x, b.y, b.r, fill, 'rgba(242,234,216,.85)');
    pxText(label, b.x, b.y+6, b.id==='jump'?20:16, '#fff', 'center');
    if (sub) pxText(sub, b.x, b.y+26, 13, '#ffd84d', 'center');
    if (b.id==='shot' && p.loaded){ // 장전된 슬라임 미리보기
      ctx.fillStyle='#241633'; ctx.fillRect(b.x-11, b.y-32, 22, 15);
      ctx.fillStyle=p.loaded;   ctx.fillRect(b.x-9,  b.y-30, 18, 11);
      ctx.fillStyle='#241633';  ctx.fillRect(b.x-5, b.y-26, 3, 3); ctx.fillRect(b.x+2, b.y-26, 3, 3);
    }
  }
  ctx.restore();
}

function drawHUD() {
  const p=G.player, st=STAGES[G.stage], b=G.boss;
  // 좌상단 스테이터스 윈도우
  winBox(12, 12, 264, 108);
  for (let i=0;i<p.maxHp;i++){
    ctx.drawImage(i<p.hp?sprHeart:sprHeartEmpty, 28+i*27, 26, 21, 18);
  }
  ctx.drawImage(sprCoin, 28, 54, 18, 18);
  pxText('x '+G.coins, 52, 69, 16, '#ffe9a8');
  ctx.drawImage(sprBomb, 126, 51, 18, 21);
  pxText('x '+G.bombs, 150, 69, 16, '#ffd2b8');
  pxText('장전', 28, 100, 14, '#a8c0ff');
  ctx.fillStyle=K; ctx.fillRect(70, 84, 30, 24);
  if (p.loaded){
    ctx.fillStyle=p.loaded; ctx.fillRect(76, 92, 18, 12);
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fillRect(79, 94, 4, 3);
    ctx.fillStyle='#241633'; ctx.fillRect(80, 98, 3, 3); ctx.fillRect(87, 98, 3, 3);
  } else pxText('- (Q)', 108, 102, 14, '#8a9ad0');

  // 상단 중앙: 스테이지 + 진행도
  winBox(W/2-140, 12, 280, b && b.awake ? 42 : 66);
  pxText(st.name, W/2, 40, 17, '#fff', 'center');
  if (!(b && b.awake)){
    const prog = Math.min(1, p.x / (G.levelLen - 250));
    pxBar(W/2-110, 50, 220, 12, prog, '#5fe0c8', '#1a2450');
    // 보스 아이콘(끝)과 플레이어 점
    ctx.drawImage(SPR[G.stage].boss, W/2+112, 42, 27, 20);
    ctx.fillStyle='#fff';
    ctx.fillRect(W/2-113+Math.round(220*prog/3)*3, 47, 6, 18);
  }
  // 보스 HP 윈도우
  if (b && b.awake){
    winBox(W-330, 12, 318, 66);
    pxText('BOSS  '+st.bossName, W-312, 40, 15, '#ffb0c0');
    pxBar(W-312, 50, 282, 14, Math.max(0,b.hp)/b.maxHp, '#ff4f6e', '#3a1020');
    pxText(Math.max(0,b.hp)+'/'+b.maxHp, W-171, 62, 12, '#fff', 'center');
  }
}

function drawBanner(lines, accent) {
  const bw = 520, bh = 40 + lines.length*34;
  winBox(W/2-bw/2, H/2-bh/2, bw, bh);
  lines.forEach((l,i)=>{
    pxText(l.t, W/2, H/2-bh/2+44+i*34, l.s||18, l.c||'#fff', 'center');
  });
}

function drawOverlay(title, subs, color) {
  ctx.fillStyle='rgba(12,8,30,.6)'; ctx.fillRect(0,0,W,H);
  // 도트 프레임
  winBox(W/2-300, H/2-130, 600, 260);
  pxText(title, W/2, H/2-52, 46, color, 'center');
  subs.forEach((s,i)=>pxText(s, W/2, H/2+2+i*30, 17, '#e8e8ff', 'center'));
  if (Math.floor(G.time*2)%2===0)
    pxText('▶ 화면을 탭하세요', W/2, H/2+96, 20, '#ffd84d', 'center');
}

function drawTitleScreen() {
  renderWorldForTitle();
  ctx.drawImage(buf, 0, 0, W, H);
  // 로고
  pxText('슬라임 헌터', W/2+4, 214, 68, 'rgba(0,0,0,.45)', 'center');
  ctx.font='68px '+FONT; ctx.textAlign='center';
  const g=ctx.createLinearGradient(0,150,0,220);
  g.addColorStop(0,'#ff8fb0'); g.addColorStop(.55,'#ff5d8f'); g.addColorStop(.56,'#e0336b'); g.addColorStop(1,'#c9205c');
  ctx.fillStyle=g; ctx.fillText('슬라임 헌터', W/2, 210);
  ctx.textAlign='left';
  pxText('- DOT EDITION -', W/2, 248, 20, '#5fe0c8', 'center');
  winBox(W/2-290, 300, 580, 96);
  pxText('오른쪽으로 전진! 슬라임을 흡입/발사해서', W/2, 338, 17, '#fff', 'center');
  pxText('맵 끝에 잠든 왕 슬라임을 물리치자!', W/2, 366, 17, '#fff', 'center');
  if (Math.floor(G.time*2)%2===0)
    pxText('▶ 화면을 탭해서 시작!', W/2, 448, 24, '#ffd84d', 'center');
}
function renderWorldForTitle() {
  px.clearRect(0,0,BW,BH);
  drawBG(0);
  // 슬라임 퍼레이드
  for(let i=0;i<5;i++){
    const spr = SPR[i].slime;
    const y = 157 - ((Math.sin(G.time*2+i*1.3)>0)?2:0);
    px.drawImage(spr, 30+i*58, y-11-((i%2)*1), 16, 11);
  }
  px.drawImage(SPR[0].boss, 246, 157-50, 68, 50);
  px.drawImage(sprCrown, 268, 157-56, 22, 9);
  // 주인공
  px.drawImage(sprPlayerA, 20, 157-19, 16, 19);
}

/* ---------------- 루프 ---------------- */
let last = performance.now();
function loop(now) {
  const dt = Math.min(.033, (now-last)/1000); last = now;
  update(dt);
  ctx.clearRect(0,0,W,H);

  if (G.scene==='title') { drawTitleScreen(); requestAnimationFrame(loop); return; }

  renderWorld();
  // 셰이크는 3px 단위(도트 격자 유지)
  const shk = G.shake>0 ? (Math.round((Math.random()-.5)*G.shake/3)*3) : 0;
  const shkY = G.shake>0 ? (Math.round((Math.random()-.5)*G.shake/3)*3) : 0;
  ctx.drawImage(buf, shk, shkY, W, H);

  if (G.scene==='play' || G.scene==='clear' || G.scene==='gameover' || G.scene==='victory') {
    // 팝업 텍스트 (고해상도, 도트 폰트)
    for (const pp of G.pops){
      ctx.globalAlpha=Math.min(1,pp.t*2);
      pxText(pp.txt, pp.x-G.camX, pp.y, 16, pp.c, 'center');
      ctx.globalAlpha=1;
    }
    drawHUD();
    if (G.scene==='play') drawTouchControls();
  }
  if (G.scene==='play' && G.nameT>0){
    ctx.globalAlpha=Math.min(1,G.nameT);
    drawBanner([{t:STAGES[G.stage].name, s:26},
                {t:'→ 오른쪽 끝의 보스에게 전진!', s:16, c:'#ffd84d'}]);
    ctx.globalAlpha=1;
  }
  if (G.scene==='play' && G.bossIntro>0){
    ctx.globalAlpha=Math.min(1,G.bossIntro);
    drawBanner([{t:'! BOSS !  '+STAGES[G.stage].bossName, s:24, c:'#ff5d8f'},
                {t:'공격 '+STAGES[G.stage].bossHP+'회 필요 - 슬라임을 흡입해서 발사!', s:15}]);
    ctx.globalAlpha=1;
  }
  if (G.scene==='clear') drawOverlay('STAGE CLEAR!', ['보스를 물리쳤다!', '다음 스테이지로 - 하트 +1 회복'], '#5fe0c8');
  if (G.scene==='gameover') drawOverlay('GAME OVER', ['획득 코인: '+G.coins+'개', '다시 도전해 보자!'], '#ff4f6e');
  if (G.scene==='victory') drawOverlay('ALL CLEAR!', ['5개 스테이지의 왕 슬라임을 모두 물리쳤다!', '최종 코인: '+G.coins+'개'], '#ffd84d');

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
